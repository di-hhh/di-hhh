# 通过 update_waka.py 调用 WakaTime stats API 拉取多维度编码统计，
# 格式化为 markdown 后写回 README.md 中指定占位符之间。
# 取代了早前的 athul/waka-readme action — 现在可展示语言、编辑器及操作系统分布。
name: WakaTime Stats

on:
  # 每天 UTC 0 点和 12 点各运行一次
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update WakaTime stats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fetch stats & update README
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python update_waka.py

      - name: Commit if README changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes to README.md, skipping commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update wakatime stats"
            git push
          fi
