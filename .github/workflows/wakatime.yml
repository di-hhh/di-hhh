# 使用 WakaTime API 在 README 中绘制代码语言时长统计进度条
# 通过 athul/waka-readme action 自动抓取并写回 README.md。
name: WakaTime Stats

on:
  # 每天 UTC 0 点和 12 点各运行一次
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update WakaTime stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Update README with WakaTime stats
        uses: athul/waka-readme@master
        with:
          # GH_TOKEN 默认使用 github.token，profile 仓库无需额外 PAT
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          BLOCKS: ░▒▓█
          CODE_LANG: true
          TIME_RANGE: last_7_days
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_TOTAL: true
          SHOW_MASKED_TIME: false
          COMMIT_MESSAGE: "chore: update waka-readme stats"
