# 每天计算年度进度条并更新 README.md
# 运行 update_progress.py，若有改动则由 github-actions 机器人提交回主分支。
name: Year Progress

on:
  schedule:
    # 每天 UTC 0 点运行一次
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-progress:
    name: Update year progress bar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run progress update script
        run: python update_progress.py

      - name: Commit changes if README has diffs
        run: |
          if git diff --quiet README.md; then
            echo "No changes to README.md, skipping commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update year progress bar"
            git push
          fi
